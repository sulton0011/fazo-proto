syntax = "proto3";

package fazo.v1;

import "fazo/v1/file_types.proto";
import "google/api/annotations.proto";

option go_package = "fazo-service/gen/fazo/v1;fazov1";

service FileService {
    rpc GetFile(GetFileRequest) returns (GetFileResponse) {
        option (google.api.http) = {
            get: "/v1/files/{id}"
        };
    }

    rpc CreateUpload(CreateUploadRequest) returns (CreateUploadResponse) {
        option (google.api.http) = {
            post: "/v1/files/upload"
            body: "*"
        };
    }

    rpc GetUploadInfo(GetUploadInfoRequest) returns (GetUploadInfoResponse) {
        option (google.api.http) = {
            get: "/v1/files/upload/{id}"
        };
    }

    rpc CancelUpload(CancelUploadRequest) returns (CancelUploadResponse) {
        option (google.api.http) = {
            delete: "/v1/files/upload/{id}"
        };
    }

    rpc RetryUpload(RetryUploadRequest) returns (RetryUploadResponse) {
        option (google.api.http) = {
            post: "/v1/files/{id}/retry"
        };
    }
}
