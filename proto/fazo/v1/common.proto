syntax = "proto3";

package fazo.v1;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package                                                    = "fazo-service/gen/fazo/v1;fazov1";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: { title: "Fazo Service Api Docs" version: "1.0.0" }
    security_definitions: {
        security: {
            key: "BearerAuth"
            value: { type: TYPE_API_KEY name: "Authorization" in: IN_HEADER }
        }
    }
    security: {
        security_requirement: {
            key: "BearerAuth"
            value: {}
        }
    }
    responses: {
        key: "400"
        value: {
            description: "Invalid argument"
            schema: { json_schema: { ref: ".fazo.v1.ErrorResponse" } }
        }
    }
    responses: {
        key: "401"
        value: {
            description: "Unauthenticated"
            schema: { json_schema: { ref: ".fazo.v1.ErrorResponse" } }
        }
    }
    responses: {
        key: "403"
        value: {
            description: "Permission denied"
            schema: { json_schema: { ref: ".fazo.v1.ErrorResponse" } }
        }
    }
    responses: {
        key: "404"
        value: {
            description: "Not found"
            schema: { json_schema: { ref: ".fazo.v1.ErrorResponse" } }
        }
    }
    responses: {
        key: "409"
        value: {
            description: "Already exists"
            schema: { json_schema: { ref: ".fazo.v1.ErrorResponse" } }
        }
    }
    responses: {
        key: "500"
        value: {
            description: "Internal server error"
            schema: { json_schema: { ref: ".fazo.v1.ErrorResponse" } }
        }
    }
};

// ErrorResponse is the top-level error envelope returned by the API.
// Example: {"error": {"code": "InvalidArgument", "message": "password must be at least 8 characters"}}
message ErrorResponse {
    ErrorDetail error = 1;
}

// ErrorDetail contains the error code and human-readable message.
message ErrorDetail {
    string code    = 1;
    string message = 2;
}
