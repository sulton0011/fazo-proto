syntax = "proto3";

package fazo.v1;

option go_package = "github.com/sulton0011/fazo-proto/gen/fazo/v1;fazov1";

message RegisterRequest {
  string full_name = 1;
  string username  = 2;
  string password  = 3;
  string phone     = 4; // optional, E.164
}

message RegisterResponse {
  string access_token  = 1;
  string refresh_token = 2;
  User   user          = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string access_token  = 1;
  string refresh_token = 2;
  User   user          = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message ProfilePic {
  string id        = 1;
  string url       = 2;
  int64  posted_at = 3;
}

message User {
  string              id             = 1;
  string              full_name      = 2;
  string              username       = 3;
  string              phone          = 4;
  string              bio            = 5;
  bool                profile_hidden = 6;
  string              background_pic = 7;
  int64               created_at     = 8;
  repeated ProfilePic profile_pics   = 9;
}

