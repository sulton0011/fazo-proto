syntax = "proto3";

package fazo.v1;

option go_package = "fazo-service/gen/fazo/v1;fazov1";

message Location {
    double latitude  = 1 [json_name = "latitude"];
    double longitude = 2 [json_name = "longitude"];
    string address   = 3 [json_name = "address"];
}

message Message {
    string id                      = 1 [json_name = "id"];
    string sender_id               = 2 [json_name = "sender_id"];
    string recipient_id            = 3 [json_name = "recipient_id"];
    string content                 = 4 [json_name = "content"];
    repeated string images         = 5 [json_name = "images"];
    repeated string videos         = 6 [json_name = "videos"];
    repeated string voice_messages = 7 [json_name = "voice_messages"];
    int64 created_at               = 8 [json_name = "created_at"];
    optional Location location     = 9 [json_name = "location"];
    bool is_read                   = 10 [json_name = "is_read"];
}

message ChatSummary {
    string contact_id    = 1 [json_name = "contact_id"];  // boshqa foydalanuvchi ID si
    Message last_message = 2 [json_name = "last_message"];
    int64 unread_count   = 3 [json_name = "unread_count"];
    bool is_pinned       = 4 [json_name = "is_pinned"];
}

message PinnedChat {
    string contact_id = 1 [json_name = "contact_id"];
    int64 created_at  = 2 [json_name = "created_at"];
}

message SendMessageRequest {
    string recipient_id            = 1 [json_name = "recipient_id"];
    string content                 = 2 [json_name = "content"];
    repeated string images         = 3 [json_name = "images"];
    repeated string videos         = 4 [json_name = "videos"];
    repeated string voice_messages = 5 [json_name = "voice_messages"];
    optional Location location     = 6 [json_name = "location"];
}

message SendMessageResponse {
    Message message = 1 [json_name = "message"];
}

message GetMessagesRequest {
    string contact_id = 1 [json_name = "contact_id"];
    int64 cursor      = 2 [json_name = "cursor"];     // Unix timestamp, 0 = latest
    int32 page_size   = 3 [json_name = "page_size"];   // default 30
}

message GetMessagesResponse {
    repeated Message messages = 1 [json_name = "messages"];
    int64 next_cursor         = 2 [json_name = "next_cursor"];  // 0 = no more
    bool has_more             = 3 [json_name = "has_more"];
}

message UpdateMessageRequest {
    string id                      = 1 [json_name = "id"];
    string content                 = 2 [json_name = "content"];
    repeated string images         = 3 [json_name = "images"];
    repeated string videos         = 4 [json_name = "videos"];
    repeated string voice_messages = 5 [json_name = "voice_messages"];
    optional Location location     = 6 [json_name = "location"];
}

message UpdateMessageResponse {
    Message message = 1 [json_name = "message"];
}

message DeleteMessageRequest {
    string id = 1 [json_name = "id"];
}

message DeleteMessageResponse {}

message GetChatListRequest {}

message GetChatListResponse {
    repeated ChatSummary chats = 1 [json_name = "chats"];
}

message GetUnreadCountRequest {
    string contact_id = 1 [json_name = "contact_id"];
}

message GetUnreadCountResponse {
    int64 count = 1 [json_name = "count"];
}

message MarkMessagesAsReadRequest {
    string          contact_id  = 1 [json_name = "contact_id"];
    repeated string message_ids = 2 [json_name = "message_ids"];
}

message MarkMessagesAsReadResponse {}

message SetChatPinnedRequest {
    string contact_id = 1 [json_name = "contact_id"];
    bool pinned       = 2 [json_name = "pinned"];
}

message SetChatPinnedResponse {}

message GetPinnedChatsRequest {}

message GetPinnedChatsResponse {
    repeated PinnedChat pinned_chats = 1 [json_name = "pinned_chats"];
}

message StreamMessagesRequest {
    string contact_id = 1 [json_name = "contact_id"];  // empty = listen to all incoming messages
}

// EditEvent — xabar tahrirlandi
message EditEvent {
    Message updated_message = 1 [json_name = "updated_message"];
}

// DeleteEvent — xabar o'chirildi
message DeleteEvent {
    string message_id = 1 [json_name = "message_id"];
    string sender_id  = 2 [json_name = "sender_id"];
}

// ReadReceipt — xabar o'qildi bildirishi
message ReadReceipt {
    string reader_id   = 1 [json_name = "reader_id"];
    string contact_id  = 2 [json_name = "contact_id"];
    int64 last_read_at = 3 [json_name = "last_read_at"];
}

// ChatEvent — StreamMessages orqali keladigan barcha event tiplari
message ChatEvent {
    oneof event {
        Message     message      = 1;
        EditEvent   edit_event   = 2;
        DeleteEvent delete_event = 3;
        ReadReceipt read_receipt = 4;
    }
}

// ChatListUpdate — StreamChatList orqali chat ro'yxati yangilanishi
message ChatListUpdate {
    string  contact_id   = 1 [json_name = "contact_id"];
    Message last_message = 2 [json_name = "last_message"];
    int64   unread_count = 3 [json_name = "unread_count"];
}

// StreamChatListRequest — filter yo'q, barcha chatlardan update keladi
message StreamChatListRequest {}
