syntax = "proto3";

package fazo.v1;

option go_package = "fazo-service/gen/fazo/v1;fazov1";

message FileRecord {
    string id            = 1  [json_name = "id"];
    string uploader_id   = 2  [json_name = "uploader_id"];
    string entity_type   = 3  [json_name = "entity_type"];
    string entity_id     = 4  [json_name = "entity_id"];
    string object_key    = 5  [json_name = "object_key"];
    string thumbnail_key = 6  [json_name = "thumbnail_key"];
    int64 original_size  = 7  [json_name = "original_size"];
    int64 thumbnail_size = 8  [json_name = "thumbnail_size"];
    string content_type  = 9  [json_name = "content_type"];
    int32 width          = 10 [json_name = "width"];
    int32 height         = 11 [json_name = "height"];
    int64 created_at     = 12 [json_name = "created_at"];
    string file_type     = 13 [json_name = "file_type"];      // 'photo' | 'video' | 'audio' | 'file'
    string upload_status = 14 [json_name = "upload_status"];   // 'uploading' | 'processing' | 'ready' | 'failed'
    string file_name     = 15 [json_name = "file_name"];       // original file name
}

message GetFileRequest {
    string id = 1 [json_name = "id"];
}

message GetFileResponse {
    FileRecord file = 1 [json_name = "file"];
}

message CreateUploadRequest {
    string entity_type = 1 [json_name = "entity_type"];   // 'chat' | 'post' | 'comment' | 'profile'
    string entity_id   = 2 [json_name = "entity_id"];
    string file_name   = 3 [json_name = "file_name"];
    int64 total_size   = 4 [json_name = "total_size"];    // bytes
}

message CreateUploadResponse {
    string upload_id = 1 [json_name = "upload_id"];
}

message GetUploadInfoRequest {
    string id = 1 [json_name = "id"];
}

message GetUploadInfoResponse {
    int64 offset     = 1 [json_name = "offset"];       // hozir yuklanilgan baytlar
    int64 total_size = 2 [json_name = "total_size"];   // umumiy fayl hajmi
}

message CancelUploadRequest {
    string id = 1 [json_name = "id"];
}

message CancelUploadResponse {}

message RetryUploadRequest {
    string id = 1 [json_name = "id"];
}

message RetryUploadResponse {}
