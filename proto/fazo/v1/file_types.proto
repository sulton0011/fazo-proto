syntax = "proto3";

package fazo.v1;

option go_package = "fazo-service/gen/fazo/v1;fazov1";

message FileRecord {
    string id            = 1;
    string uploader_id   = 2;
    string entity_type   = 3;
    string entity_id     = 4;
    string object_key    = 5;
    string thumbnail_key = 6;
    int64 original_size  = 7;
    int64 thumbnail_size = 8;
    string content_type  = 9;
    int32 width          = 10;
    int32 height         = 11;
    int64 created_at     = 12;
    string file_type     = 13;  // 'photo' | 'video' | 'audio' | 'file'
    string upload_status = 14;  // 'uploading' | 'processing' | 'ready' | 'failed'
    string file_name     = 15;  // original file name
}

message GetFileRequest {
    string id = 1;
}

message GetFileResponse {
    FileRecord file = 1;
}

message CreateUploadRequest {
    string entity_type = 1;  // 'chat' | 'post' | 'comment' | 'profile'
    string entity_id   = 2;
    string file_name   = 3;
    int64 total_size   = 4;  // bytes
}

message CreateUploadResponse {
    string upload_id = 1;
}

message GetUploadInfoRequest {
    string id = 1;
}

message GetUploadInfoResponse {
    int64 offset     = 1;  // hozir yuklanilgan baytlar
    int64 total_size = 2;  // umumiy fayl hajmi
}

message CancelUploadRequest {
    string id = 1;
}

message CancelUploadResponse {}

message RetryUploadRequest {
    string id = 1;
}

message RetryUploadResponse {}
