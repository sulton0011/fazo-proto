syntax = "proto3";

package fazo.v1;

import "fazo/v1/auth_types.proto";

option go_package = "fazo-service/gen/fazo/v1;fazov1";

message UpdateUserRequest {
    string full_name = 1 [json_name = "full_name"];
    string bio       = 2 [json_name = "bio"];
    string phone     = 3 [json_name = "phone"];  // optional, E.164
}

message UpdateUserResponse {
    User user = 1 [json_name = "user"];
}

message UpdateUsernameRequest {
    string username = 1 [json_name = "username"];
}

message UpdateUsernameResponse {
    User user = 1 [json_name = "user"];
}

message UpdatePasswordRequest {
    string old_password = 1 [json_name = "old_password"];
    string new_password = 2 [json_name = "new_password"];
}

message UpdatePasswordResponse {}

message AddProfilePictureRequest {
    string url = 1 [json_name = "url"];
}

message AddProfilePictureResponse {
    ProfilePic profile_pic = 1 [json_name = "profile_pic"];
}

message DeleteProfilePictureRequest {
    string id = 1 [json_name = "id"];
}

message DeleteProfilePictureResponse {}

message GetProfilePicturesRequest {
    string user_id = 1 [json_name = "user_id"];
}

message GetProfilePicturesResponse {
    repeated ProfilePic profile_pics = 1 [json_name = "profile_pics"];
}

message SetBackgroundPicRequest {
    string object_key = 1 [json_name = "object_key"];
}

message SetBackgroundPicResponse {
    User user = 1 [json_name = "user"];
}

message GetUserByIDRequest {
    string id = 1 [json_name = "id"];
}

message GetUserByIDResponse {
    User user = 1 [json_name = "user"];
}

message GetUserByUsernameRequest {
    string username = 1 [json_name = "username"];
}

message GetUserByUsernameResponse {
    User user = 1 [json_name = "user"];
}

message GetMeRequest {}

message GetMeResponse {
    User user = 1 [json_name = "user"];
}

enum UserSortBy {
    SORT_BY_UNSPECIFIED = 0;
    SORT_BY_CREATED_AT  = 1;
    SORT_BY_USERNAME    = 2;
    SORT_BY_FULL_NAME   = 3;
}

message GetAllUsersRequest {
    string cursor       = 1 [json_name = "cursor"];      // ULID, optional
    int32 page_size     = 2 [json_name = "page_size"];   // default 20, max 50
    string search       = 3 [json_name = "search"];      // ILIKE on full_name + username
    UserSortBy sort_by  = 4 [json_name = "sort_by"];     // 0 = created_at DESC
}

message GetAllUsersResponse {
    repeated User users = 1 [json_name = "users"];
    string next_cursor  = 2 [json_name = "next_cursor"];
    bool has_more       = 3 [json_name = "has_more"];
}
